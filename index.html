<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5ドライバー診断 | あなたの経営スタイルを解明する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0e;
    --paper: #f5f0e8;
    --accent: #c4391a;
    --accent-soft: #f0d5ce;
    --muted: #7a7068;
    --border: #d4cfc5;
    --white: #fdfaf5;
    --gold: #b8960c;
    --navy: #1a3c5e;
    --green: #2d6a4f;
    --deep-red: #7a1f1f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(196,57,26,0.035) 39px, rgba(196,57,26,0.035) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(196,57,26,0.025) 39px, rgba(196,57,26,0.025) 40px);
    pointer-events: none; z-index: 0;
  }

  .screen {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: none; flex-direction: column; align-items: center;
    padding: 0 20px;
  }
  .screen.active { display: flex; }

  /* ══════ TOP ══════ */
  #screen-top {
    justify-content: center; text-align: center; padding: 60px 20px;
  }
  .top-inner { max-width: 520px; width: 100%; }

  .logo-mark {
    width: 56px; height: 56px;
    border: 1.5px solid var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 36px;
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent);
    position: relative;
  }
  .logo-mark::after {
    content: ''; position: absolute; inset: 4px;
    border: 1px solid rgba(196,57,26,0.25); border-radius: 50%;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 3px; color: var(--accent);
    text-transform: uppercase; margin-bottom: 22px;
  }

  .top-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(26px, 7vw, 44px);
    font-weight: 700; line-height: 1.4; color: var(--ink); margin-bottom: 10px;
  }
  .top-title em { font-style: normal; color: var(--accent); border-bottom: 2px solid var(--accent); }

  .top-en {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 4px; margin-bottom: 36px;
  }

  .divider { width: 36px; height: 1px; background: var(--accent); margin: 0 auto 32px; }

  .top-desc { font-size: 14px; line-height: 2.1; color: var(--muted); margin-bottom: 40px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 44px; }
  .chip {
    padding: 5px 14px; border: 1px solid var(--border); border-radius: 2px;
    font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace;
  }

  /* ニックネーム入力 */
  .name-block {
    background: var(--white); border: 1px solid var(--border);
    padding: 28px; margin-bottom: 32px; text-align: left;
  }
  .name-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 10px; display: block;
  }
  .name-input {
    width: 100%; padding: 14px 16px;
    border: 1px solid var(--border); background: var(--paper);
    font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .btn-start {
    display: inline-block; padding: 18px 56px;
    background: var(--ink); color: var(--white);
    font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 700;
    letter-spacing: 2px; border: none; cursor: pointer; transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    position: relative;
  }
  .btn-start:hover { background: var(--accent); transform: translateY(-2px); }
  .top-note { margin-top: 24px; font-size: 11px; color: rgba(122,112,104,0.6); font-family: 'DM Mono', monospace; }

  /* ══════ QUIZ ══════ */
  #screen-quiz { justify-content: flex-start; padding-top: 0; }

  .quiz-header {
    width: 100%; max-width: 680px;
    padding: 28px 0 16px; position: sticky; top: 0;
    background: var(--paper); z-index: 10;
    border-bottom: 1px solid rgba(212,207,197,0.5);
  }
  .progress-wrap { display: flex; align-items: center; gap: 16px; }
  .progress-bar { flex: 1; height: 2px; background: var(--border); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); width: 0%; }
  .progress-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 44px; text-align: right; }

  .quiz-body { width: 100%; max-width: 680px; padding: 36px 0 80px; }

  .scene-card {
    background: var(--ink); color: var(--white);
    padding: 26px 30px; margin-bottom: 32px;
    position: relative; overflow: hidden;
    opacity: 0; animation: fadeUp 0.45s ease forwards 0.1s;
  }
  .scene-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .scene-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 12px; }
  .scene-text { font-family: 'Shippori Mincho', serif; font-size: clamp(14px, 3.5vw, 17px); line-height: 1.85; }
  .scene-arrow { display: block; margin-top: 14px; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

  .question-wrap { opacity: 0; animation: fadeUp 0.45s ease forwards 0.2s; margin-bottom: 24px; }
  .q-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .q-text { font-family: 'Shippori Mincho', serif; font-size: clamp(15px, 3.8vw, 19px); font-weight: 700; line-height: 1.65; color: var(--ink); }

  .opts { display: flex; flex-direction: column; gap: 10px; opacity: 0; animation: fadeUp 0.45s ease forwards 0.3s; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 17px 20px; background: var(--white);
    border: 1px solid var(--border); cursor: pointer;
    text-align: left; width: 100%; transition: all 0.22s ease;
    position: relative; overflow: hidden;
  }
  .opt-btn::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); transform: scaleY(0); transform-origin: center; transition: transform 0.22s ease; }
  .opt-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateX(4px); }
  .opt-btn:hover::after { transform: scaleY(1); }
  .opt-btn.selected { border-color: var(--accent); background: var(--accent-soft); transform: translateX(4px); pointer-events: none; }
  .opt-btn.selected::after { transform: scaleY(1); }
  .opt-n { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(196,57,26,0.6); min-width: 16px; margin-top: 3px; flex-shrink: 0; }
  .opt-t { font-size: 14px; line-height: 1.75; color: var(--ink); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* ══════ RESULT ══════ */
  #screen-result { padding: 56px 20px 80px; justify-content: flex-start; }

  .rw { width: 100%; max-width: 680px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }

  .r-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .r-name-tag { font-size: 13px; color: var(--muted); margin-bottom: 16px; font-family: 'DM Mono', monospace; }
  .r-main-name { font-family: 'Shippori Mincho', serif; font-size: clamp(32px, 9vw, 54px); font-weight: 900; line-height: 1.1; color: var(--ink); margin-bottom: 6px; }
  .r-main-en { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); letter-spacing: 3px; margin-bottom: 8px; }
  .r-voice { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
  .r-pcm-badge {
    display: inline-block; padding: 4px 12px;
    border: 1px solid var(--gold); color: var(--gold);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 1px; margin-bottom: 36px;
  }
  .r-divider { height: 1px; background: var(--border); margin-bottom: 36px; }

  /* Score bars */
  .score-section { margin-bottom: 44px; }
  .sec-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; }
  .sbar { margin-bottom: 14px; }
  .sbar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .sbar-nm { font-size: 13px; font-weight: 700; color: var(--ink); }
  .sbar-nm span { font-weight: 400; color: var(--muted); font-size: 11px; margin-left: 5px; }
  .sbar-v { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .sbar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 2px; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); width: 0%; }

  /* Detail cards */
  .detail-cards { display: grid; gap: 20px; margin-bottom: 44px; }

  .dcard { padding: 28px; background: var(--white); border: 1px solid var(--border); position: relative; overflow: hidden; }
  .dcard::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .dcard.strength::before { background: var(--accent); }
  .dcard.shadow::before  { background: var(--navy); }
  .dcard.jobs::before    { background: var(--gold); }
  .dcard.sub::before     { background: var(--green); }

  .dcard-badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .dcard.strength .dcard-badge { color: var(--accent); }
  .dcard.shadow  .dcard-badge  { color: var(--navy); }
  .dcard.jobs    .dcard-badge  { color: var(--gold); }
  .dcard.sub     .dcard-badge  { color: var(--green); }

  .dcard-title { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
  .dcard-body { font-size: 14px; line-height: 2.1; color: #3a3530; }

  .verb-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .verb { padding: 6px 14px; border: 1px solid var(--border); font-size: 12px; color: var(--ink); font-weight: 700; background: var(--paper); }
  .verb.dark { background: var(--ink); border-color: var(--ink); color: var(--white); }
  .verb.gold { background: var(--gold); border-color: var(--gold); color: var(--white); }

  /* Insight */
  .insight { background: var(--ink); color: var(--white); padding: 32px; margin-bottom: 44px; position: relative; overflow: hidden; }
  .insight::before { content: '"'; position: absolute; top: 6px; left: 18px; font-family: 'Shippori Mincho', serif; font-size: 100px; line-height: 1; color: rgba(255,255,255,0.05); pointer-events: none; }
  .insight-body { font-family: 'Shippori Mincho', serif; font-size: 14px; line-height: 2.2; position: relative; z-index: 1; }
  .insight-act { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; position: relative; z-index: 1; }

  /* Permission */
  .perm-box { background: var(--white); border: 1px solid var(--border); padding: 28px; margin-bottom: 44px; }
  .perm-title { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
  .perm-body { font-size: 13px; line-height: 2.1; color: #3a3530; margin-bottom: 18px; }
  .perm-list { display: flex; flex-direction: column; gap: 8px; }
  .perm-item { display: flex; align-items: center; gap: 10px; font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 700; }
  .perm-dot { width: 20px; height: 20px; border: 1.5px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--accent); flex-shrink: 0; }

  /* Action buttons */
  .action-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 44px; }

  .btn-dl {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 17px 24px; background: var(--ink); color: var(--white);
    font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; transition: all 0.3s; width: 100%;
  }
  .btn-dl:hover { background: #2a2828; transform: translateY(-2px); }

  .btn-line {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 17px 24px; background: #06C755; color: var(--white);
    font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; transition: all 0.3s; width: 100%;
    text-decoration: none;
  }
  .btn-line:hover { background: #05a847; transform: translateY(-2px); }

  .btn-cta {
    display: block; width: 100%; padding: 18px 32px;
    background: var(--accent); color: var(--white);
    font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 700;
    letter-spacing: 1px; border: none; cursor: pointer; transition: all 0.3s;
    margin-bottom: 12px;
  }
  .btn-cta:hover { background: #a02a14; transform: translateY(-2px); }

  .btn-retry { display: block; margin: 0 auto; background: none; border: none; font-size: 13px; color: var(--muted); text-decoration: underline; cursor: pointer; font-family: 'Noto Serif JP', serif; }
  .btn-retry:hover { color: var(--ink); }
  /* PDF download button */
  .btn-pdf {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 17px 24px; background: var(--white);
    border: 1.5px solid var(--ink); color: var(--ink);
    font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.3s; width: 100%;
    text-decoration: none;
  }
  .btn-pdf:hover { background: var(--ink); color: var(--white); transform: translateY(-2px); }
  .pdf-section {
    background: var(--white); border: 1px solid var(--border);
    padding: 28px; margin-bottom: 44px;
  }
  .pdf-section-badge {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 10px;
  }
  .pdf-section-title {
    font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700;
    color: var(--ink); margin-bottom: 8px;
  }
  .pdf-section-desc { font-size: 13px; color: var(--muted); line-height: 1.9; margin-bottom: 20px; }
  .pdf-contents { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
  .pdf-content-chip {
    padding: 4px 12px; background: var(--paper);
    border: 1px solid var(--border); font-size: 11px; color: var(--ink);
  }


  .cta-block { text-align: center; border-top: 1px solid var(--border); padding-top: 44px; }
  .cta-title { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
  .cta-sub { font-size: 13px; color: var(--muted); line-height: 1.9; margin-bottom: 28px; }

  .icon { display: inline-block; width: 20px; height: 20px; }
</style>
</head>
<body>

<!-- ══════ TOP ══════ -->
<div class="screen active" id="screen-top">
  <div class="top-inner">
    <div class="logo-mark">5D</div>
    <div class="eyebrow">Driver Diagnosis for Salon Owners</div>
    <h1 class="top-title">あなたの経営を<br>動かしている<br><em>「声」</em>を知る</h1>
    <div class="top-en">5 DRIVERS SITUATION TEST</div>
    <div class="divider"></div>
    <p class="top-desc">
      理美容室の「あるあるシーン」12問に答えるだけで、<br>
      あなたの経営スタイルを支配するドライバーが<br>
      見えてきます。
    </p>
    <div class="chips">
      <span class="chip">12 scenes</span>
      <span class="chip">~2 min</span>
      <span class="chip">サロンオーナー向け</span>
      <span class="chip">交流分析ベース</span>
    </div>

    <div class="name-block">
      <label class="name-label" for="nickname">Your Nickname</label>
      <input class="name-input" id="nickname" type="text" placeholder="例：たかし、みほさん、田中オーナー" maxlength="20" />
      <div class="name-hint">※ 結果データに使用します（本名でなくてもOK）</div>
    </div>

    <button class="btn-start" onclick="startQuiz()">シーン診断をはじめる</button>
    <div class="top-note">© 神田 / LINE Beauty Seminar</div>
  </div>
</div>

<!-- ══════ QUIZ ══════ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
      <div class="progress-num" id="pn">1 / 12</div>
    </div>
  </div>
  <div class="quiz-body" id="qbody"></div>
</div>

<!-- ══════ RESULT ══════ -->
<div class="screen" id="screen-result">
  <div class="rw" id="rwrap"></div>
</div>

<script>
/* ════════════════════════════════════════
   DRIVER DATA（詳細版）
════════════════════════════════════════ */
const DRV = {
  A: {
    name:'完璧であれ', en:'BE PERFECT', emoji:'🏆',
    voice:'「きちんとしなさい」「ミスは許されない」',
    pcm:'PCM：思考型（Thinker）／ 交流分析：批判的親（CP）優位',
    color:'#c4391a',

    strength:`【あなたの強み：どんな場面で輝くか】
あなたは「仕上がりの質」で勝負できるオーナーです。カットの量感ひとつ、シャンプー台の水はねひとつに気づける観察眼は、お客様の満足度を底上げするリアルな武器になります。

特に力を発揮するのは、①技術指導の場面、②メニュー開発・品質基準の設計、③新規顧客の初回接客です。「この人に任せれば間違いない」という信頼は、あなたのような精度への執着から生まれます。また、マニュアル整備やチェックリスト設計など、「再現性を作る仕事」が最も得意なタイプ。スタッフ10名を超えても品質が崩れないサロンのオーナーには、このドライバーが多いです。`,

    shadow:`【経営の落とし穴：無自覚に起きていること】
最大のリスクは「頭の中の基準が外に出ていない」ことです。あなたが「明らかにおかしい」と思うレベルは、スタッフには見えません。「なぜわからないの？」という怒りの裏に、「言語化されていないルール」が潜んでいます。

スタッフは「何をやっても怒られる」と感じ始め、自発的な行動を止めます。自信をなくしたスタッフは確認を繰り返すか、萎縮して黙るかのどちらかになる。気づけば「自分でやった方が早い」が口癖になり、あなた自身がボトルネックになっています。技術チェックで「まあいいか」が言えないオーナーは、このパターンに要注意です。`,

    jobs:`【適性がある業務・役割】
技術研修の設計と実施 ／ 接客マニュアル整備 ／ 品質基準書の作成 ／ 新メニュー開発 ／ スタッフ技術チェック ／ 店舗の清掃・オペレーション標準化 ／ クレーム対応の仕組み化 ／ SNS投稿の品質管理`,

    verbs:['基準化する','仕組み化する','精査する','再現させる','言語化する','設計する','チェックする','磨き上げる'],

    insight:`あなたが求める「完璧」の基準は、スタッフには見えていません。あなたの頭の中だけにあります。「なぜわからないのか」と感じる時、実は「伝えていない」だけのことが多い。言語化・マニュアル化こそがあなたの次のステップです。基準を外に出した瞬間、あなたのこだわりはチームの強みに変わります。`,

    action:'「自分が当たり前と思っていること」を箇条書きにしてスタッフと共有する',
  },

  B: {
    name:'強くあれ', en:'BE STRONG', emoji:'🏔',
    voice:'「弱みを見せるな」「弱音を吐くな」',
    pcm:'PCM：行動型（Doer）／ 交流分析：批判的親（CP）＋ 適応した子供（AC）',

function startQuiz(){
  const raw = document.getElementById('nickname').value.trim();
  nickname = raw || '匿名オーナー';
  cur=0; sc={A:0,B:0,C:0,D:0,E:0};
  showScreen('screen-quiz');
  render();
}

/* ════ Render question ════ */
function render(){
  const q = QS[cur];
  const pct = Math.round((cur/QS.length)*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pn').textContent = `${cur+1} / ${QS.length}`;

  const opts = [...q.opts].sort(()=>Math.random()-0.5);
  document.getElementById('qbody').innerHTML = `
    <div class="scene-card">
      <div class="scene-label">Scene ${String(cur+1).padStart(2,'0')} / ${QS.length}</div>
      <div class="scene-text">${q.scene}<span class="scene-arrow">↓ あなたの反応は？</span></div>
    </div>
    <div class="question-wrap">
      <div class="q-label">Your Reaction</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="opts">
      ${opts.map((o,i)=>`
        <button class="opt-btn" onclick="pick('${o.d}',this)">
          <span class="opt-n">${i+1}</span>
          <span class="opt-t">${o.t}</span>
        </button>
      `).join('')}
    </div>
  `;
}

/* ════ Pick answer ════ */
function pick(dKey, btn){
  sc[dKey]++;
  document.querySelectorAll('.opt-btn').forEach(b=>b.style.pointerEvents='none');
  btn.classList.add('selected');
  setTimeout(()=>{ cur++; cur<QS.length ? render() : showResult(); }, 400);
}

/* ════ CSV Download ════ */
function downloadCSV(){
  const { nickname, mainK, mainV, subK, subV, sorted, ts } = resultData;
  const main = DRV[mainK], sub = DRV[subK];

  const escCSV = v => `"${String(v).replace(/"/g,'""')}"`;

  const headers = [
    'ニックネーム','診断日時',
    'メインドライバー','メインドライバーEN','メインスコア',
    'サブドライバー','サブドライバーEN','サブスコア',
    'PCM分類（メイン）',
    '強みサマリー','落とし穴サマリー','適性業務','主要動詞',
    'Next Action',
    'スコアA(完璧であれ)','スコアB(強くあれ)','スコアC(急げ)','スコアD(喜ばせろ)','スコアE(努力しろ)',
  ];

  const scMap = Object.fromEntries(sorted);
  const values = [
    escCSV(nickname),
    escCSV(ts),
    escCSV(main.name),
    escCSV(main.en),
    mainV,
    escCSV(sub.name),
    escCSV(sub.en),
    subV,
    escCSV(main.pcm),
    escCSV(main.strength.replace(/\n/g,' ').replace(/【[^】]+】/g,'').trim().substring(0,200)+'…'),
    escCSV(main.shadow.replace(/\n/g,' ').replace(/【[^】]+】/g,'').trim().substring(0,200)+'…'),
    escCSV(main.jobs),
    escCSV(main.verbs.join(' / ')),
    escCSV(main.action),
    scMap['A']||0, scMap['B']||0, scMap['C']||0, scMap['D']||0, scMap['E']||0,
  ];

  const bom = '\uFEFF';
  const csv = bom + headers.join(',') + '\n' + values.join(',');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ドライバー診断_${nickname}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ════ LINE Share ════ */
function shareToLINE(e){
  e.preventDefault();
  const { nickname, mainK, subK, mainV, subV } = resultData;
  const main = DRV[mainK], sub = DRV[subK];
  const text = `【5ドライバー診断 結果】\n`
    + `名前：${nickname}\n`
    + `━━━━━━━━━━━━\n`
    + `🏅 メイン：${main.emoji}${main.name}（${mainV}問）\n`
    + `${main.en}\n`
    + `内なる声：${main.voice}\n\n`
    + `📊 PCM：${main.pcm}\n\n`
    + `2位：${sub.emoji}${sub.name}（${subV}問）\n`
    + `━━━━━━━━━━━━\n`
    + `Next → ${main.action}`;

  const encoded = encodeURIComponent(text);
  window.open(`https://social-plugins.line.me/lineit/share?url=&text=${encoded}`, '_blank');
}
